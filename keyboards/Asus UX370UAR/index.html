                    <span>pause</span>
                    <span>break</span>
                </span>
            </button>

            <button class="prtsc-sysrq-key content-center">
                <span class="key font-small">
                    <span>prt sc</span>
                    <span>sysrq</span>
                </span>
            </button>

            <button class="content-center">
                <span class="key font-small">insert</span>
            </button>

            <button class="content-center">
                <span class="key font-small">delete</span>
            </button>
        </div>

        <div class="row row-2">
            <button class="no-fn medium-key">
                <span class="shift-key">¬</span>
                <span class="key">`</span>
                <span class="altgr-key">|</span>

                <span class="shift-key">!</span>

            <button class="no-fn">
                <span class="shift-key">"</span>
                <span class="key">2</span>
            </button>

            <button class="no-fn">
                <span class="shift-key">£</span>
                <span class="key">3</span>
            </button>

            <button class="no-fn">
                <span class="shift-key">$</span>
                <span class="key">4</span>
                <span class="altgr-key font-medium">€</span>

            <button class="no-fn">

            </button>

            <button class="no-fn">
                <span class="shift-key">)</span>
                <span class="key">0</span>
            </button>

            <button class="no-fn">
                <span class="shift-key">—</span>
                <span class="key">-</span>
            </button>

            <button class="no-fn">
                <span class="shift-key">+</span>
                <span class="key">=</span>
            </button>

            <button class="backspace-key">
                <span class="key">
                    <span class="text">backspace</span>
                    <span class="svg">
                        <svg stroke="currentColor" fill="none" stroke-width="0" viewBox="0 0 24 24" height="200px"

                        </svg>
                    </span>
                </span>
            </button>
        </div>

        <div class="enter-key-row-outer">
            <div class="enter-key-row-inner">
                <div class="row row-3">
                    <button class="tab-key">
                        <span class="key">

                                        <path d="M7 12h14"></path>

                                </span>

                                        <path d="M21 5v14"></path>
                                    </svg>
                                </span>

                    <button>

                    <button>
                        <span class="key">W</span>

                    <button class="no-shift">

                    <button>

                    <button>
                        <span class="key">Y</span>

                    <button>

                    <button class="no-fn">

                    <button class="no-fn">

                <div class="row row-4">

                        <span class="light"></span>
                    </button>

                    <button class="no-shift">
                        <span class="key">A</span>
                        <span class="fn-key font-medium">á</span>
                    </button>

                    <button>
                        <span class="key">S</span>
                    </button>

                    <button>
                        <span class="key">D</span>
                    </button>

                    <button class="bump-key">
                        <span class="key">F</span>
                        <span class="bump"></span>
                    </button>

                    <button>
                        <span class="key">G</span>
                    </button>

                    <button>
                        <span class="key">H</span>
                    </button>

                    <button class="bump-key">

                        <span class="bump"></span>

                    <button>
                        <span class="key">K</span>
                    </button>

                    <button>
                        <span class="key">L</span>

                        <span class="key">;</span>

                    <button class="no-fn">
                        <span class="shift-key font-medium">@</span>
                        <span class="key">'</span>
                    </button>

                    <button class="no-fn">
                        <span class="shift-key">~</span>
                        <span class="key">#</span>

                                <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"

                                    d="M64 288h294c58.76 0 106-49.33 106-108v-20"></path>
                            </svg>
                        </span>
                    </span>
                </button>
            </div>
        </div>

        <div class="row row-5">
            <button class="shift-left-key">
                <span class="key">
                    <span class="text">shift</span>
                    <span class="svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" version="1.1"
                            viewBox="0 0 16 16" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">

                                d="M10.5 14h-5c-0.276 0-0.5-0.224-0.5-0.5v-5.5h-2c-0.202 0-0.385-0.122-0.462-0.309s-0.035-0.402 0.108-0.545l5-5c0.195-0.195 0.512-0.195 0.707 0l5 5c0.143 0.143 0.186 0.358 0.108 0.545s-0.26 0.309-0.462 0.309h-2v5.5c0 0.276-0.224 0.5-0.5 0.5zM6 13h4v-5.5c0-0.276 0.224-0.5 0.5-0.5h1.293l-3.793-3.793-3.793 3.793h1.293c0.276 0 0.5 0.224 0.5 0.5v5.5z">
                            </path>
                        </svg>
                    </span>
                </span>
            </button>

            <button class="no-fn">
                <span class="shift-key">|</span>
                <span class="key">\</span>

            <button>
                <span class="key">Z</span>

            <button>
                <span class="key">X</span>

            </button>

            <button>
                <span class="key">N</span>
            </button>

            <button>
                <span class="key">M</span>
            </button>

                <span class="shift-key">&lt;</span>
                <span class="key">,</span>

                <span class="shift-key">&gt;</span>
                <span class="key">.</span>

                <span class="shift-key">?</span>

                            <path
                                d="M10.5 14h-5c-0.276 0-0.5-0.224-0.5-0.5v-5.5h-2c-0.202 0-0.385-0.122-0.462-0.309s-0.035-0.402 0.108-0.545l5-5c0.195-0.195 0.512-0.195 0.707 0l5 5c0.143 0.143 0.186 0.358 0.108 0.545s-0.26 0.309-0.462 0.309h-2v5.5c0 0.276-0.224 0.5-0.5 0.5zM6 13h4v-5.5c0-0.276 0.224-0.5 0.5-0.5h1.293l-3.793-3.793-3.793 3.793h1.293c0.276 0 0.5 0.224 0.5 0.5v5.5z">
                            </path>
                        </svg>
                    </span>
                </span>
            </button>
        </div>

        <div class="row row-6">
            <button class="ctrl-left-key">
                <span class="key">ctrl</span>
            </button>

            <button>
                <span class="key">fn</span>
            </button>

            <button>
                <span class="key">
                    <span class="svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16"

                                d="M6.555 1.375 0 2.237v5.45h6.555zM0 13.795l6.555.933V8.313H0zm7.278-5.4.026 6.378L16 16V8.395zM16 0 7.33 1.244v6.414H16z">

                        </svg>
                    </span>
                </span>

            <button class="alt-left-key">
                <span class="key">alt</span>

            <button class="space-key"></button>

            <button class="alt-right-key">
                <span class="key">alt gr</span>
            </button>

            <button class="ctrl-right-key no-shift">
                <span class="key">ctrl</span>
                <span class="fn-key">
                    <span class="svg">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"

                            <path d="M7 8h10"></path>
                            <path d="M7 12h10"></path>
                            <path d="M7 16h10"></path>
                        </svg>
                    </span>
                </span>
            </button>

            <div class="arrow-keys">
                <button class="no-shift">
                    <span class="key">
                        <span class="svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"

                            </svg>

                    </span>

                    <button class="no-shift">
                        <span class="key">
                            <span class="svg">
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"

                                        d="M11.178 19.569a.998.998 0 0 0 1.644 0l9-13A.999.999 0 0 0 21 5H3a1.002 1.002 0 0 0-.822 1.569l9 13z">

                                </svg>
                            </span>
                        </span>

                        <span class="fn-key">pgdn</span>

                </div>

                <button class="no-shift">
                    <span class="key">
                        <span class="svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"

                                <path
                                    d="M5.536 21.886a1.004 1.004 0 0 0 1.033-.064l13-9a1 1 0 0 0 0-1.644l-13-9A1 1 0 0 0 5 3v18a1 1 0 0 0 .536.886z">
                                </path>
                            </svg>
                        </span>
                    </span>

                    <span class="fn-key">end</span>
                </button>
            </div>

        </div>
    </div>
