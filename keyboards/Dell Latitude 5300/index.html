<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="keyboard">
        <div class="keyboard-decor"></div>
        
        <div class="row row-1">
            <button class="bump-key">
                <span class="key align-start">Esc</span>

                <span class="fn-key align-end">
                    <span class="lock-icon svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M420 192h-68v-80a96 96 0 1 0-192 0v80H92a12 12 0 0 0-12 12v280a12 12 0 0 0 12 12h328a12 12 0 0 0 12-12V204a12 12 0 0 0-12-12zm-106 0H198v-80.75a58 58 0 1 1 116 0z">
                            </path>
                        </svg>

                        <span class="lock-text">fn</span>
                    </span>
                </span>

                <span class="bump"></span>
            </button>

            <button>
                <span class="key svg align-start">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 3.75v16.5a.75.75 0 0 1-1.255.555L5.46 16H2.75A1.75 1.75 0 0 1 1 14.25v-4.5C1 8.784 1.784 8 2.75 8h2.71l5.285-4.805A.75.75 0 0 1 12 3.75ZM6.255 9.305a.748.748 0 0 1-.505.195h-3a.25.25 0 0 0-.25.25v4.5c0 .138.112.25.25.25h3c.187 0 .367.069.505.195l4.245 3.86V5.445ZM16.28 8.22a.75.75 0 1 0-1.06 1.06L17.94 12l-2.72 2.72a.75.75 0 1 0 1.06 1.06L19 13.06l2.72 2.72a.75.75 0 1 0 1.06-1.06L20.06 12l2.72-2.72a.75.75 0 0 0-1.06-1.06L19 10.94l-2.72-2.72Z">
                        </path>
                    </svg>
                </span>

                <span class="fn-key align-end">F1</span>
            </button>

            <button>
                <span class="key svg align-start">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
                            d="M189.65 192H120a8 8 0 0 0-8 8v112a8 8 0 0 0 8 8h69.65a16 16 0 0 1 10.14 3.63l91.47 75a8 8 0 0 0 12.74-6.46V119.83a8 8 0 0 0-12.74-6.44l-91.47 75a16 16 0 0 1-10.14 3.61zM384 320c9.74-19.41 16-40.81 16-64 0-23.51-6-44.4-16-64">
                        </path>
                    </svg>
                </span>

                <span class="fn-key align-end">F2</span>
            </button>

            <button>
                <span class="key svg align-start">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
                            d="M126 192H56a8 8 0 0 0-8 8v112a8 8 0 0 0 8 8h69.65a15.93 15.93 0 0 1 10.14 3.54l91.47 74.89A8 8 0 0 0 240 392V120a8 8 0 0 0-12.74-6.43l-91.47 74.89A15 15 0 0 1 126 192zm194 128c9.74-19.38 16-40.84 16-64 0-23.48-6-44.42-16-64m48 176c19.48-33.92 32-64.06 32-112s-12-77.74-32-112m48 272c30-46 48-91.43 48-160s-18-113-48-160">
                        </path>
                    </svg>
                </span>

                <span class="fn-key align-end">F3</span>
            </button>

            <button class="light-key">
                <span class="key align-start">
                    <span class="mic-icon">
                        <span class="svg">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                aria-hidden="true" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
                                </path>
                            </svg>
                        </span>

                        <span class="svg cross-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
                                <path d="M18 6 6 18" />
                                <path d="m6 6 12 12" />
                            </svg>
                        </span>
                    </span>
                </span>

                <span class="fn-key align-end">F4</span>

                <span class="light"></span>
            </button>

            <button>
                <span class="key svg align-start keyboard-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164.71 92.84" fill="none" stroke="currentColor"
                        color="currentColor">
                        <path
                            d="M43.76,56.53c-3.32,2.57-6.65,8.46-9.24,13.61-2.32,5.27-9.3,16.79-5.89,20.11,1.74,1.42,4.69,1.47,7.28,1.65,20.35.87,75.36.57,95.72-.33,7.35-.26,10.51-1.61,7.52-9.81-2.05-5.84-6.29-14.64-10.81-20.5-6.11-8.6-15.18-9.34-24.62-9.37-10.68-.18-24.84-.17-36.71.17-7.79.3-18.5.09-23.11,4.37l-.12.1Z"
                            stroke-width="0.82" fill="currentColor" stroke="currentColor" />

                        <path d="M4.5,37.9c6.66,3.61,16.45,8.92,23.2,12.58" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M38.77,15.13l13.88,21.04" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M81.15,4.5c.08,8.11.18,19.54.26,27.54" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M124.86,13.61c-3.89,6.18-9.71,15.42-13.66,21.69" stroke-width="9"
                            stroke-linecap="round" stroke-linejoin="round" />

                        <path d="M160.21,36.16c-6.87,3.66-16.9,8.99-23.86,12.7" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </span>

                <span class="fn-key align-end">F5</span>
            </button>

            <button>
                <span class="key svg align-start">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"
                        height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                </span>

                <span class="fn-key align-end">F6</span>
            </button>

            <button>
                <span class="key svg align-start">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20"
                        aria-hidden="true" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M10 2a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 2ZM10 15a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 10 15ZM10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM15.657 5.404a.75.75 0 1 0-1.06-1.06l-1.061 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM6.464 14.596a.75.75 0 1 0-1.06-1.06l-1.06 1.06a.75.75 0 0 0 1.06 1.06l1.06-1.06ZM18 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 18 10ZM5 10a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 5 10ZM14.596 15.657a.75.75 0 0 0 1.06-1.06l-1.06-1.061a.75.75 0 1 0-1.06 1.06l1.06 1.06ZM5.404 6.464a.75.75 0 0 0 1.06-1.06l-1.06-1.06a.75.75 0 1 0-1.061 1.06l1.06 1.06Z">
                        </path>
                    </svg>
                </span>

                <span class="fn-key align-end">F7</span>
            </button>

            <button>
                <span class="key align-start">
                    <span class="extend-screen-icon">
                        <span class="svg laptop-icon">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 32 32"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M 5 6 L 5 19.5625 L 2.71875 21.875 C 2.265625 22.328125 2 22.953125 2 23.59375 C 2 24.914063 3.085938 26 4.40625 26 L 27.59375 26 C 28.914063 26 30 24.914063 30 23.59375 C 30 22.953125 29.734375 22.328125 29.28125 21.875 L 27 19.5625 L 27 6 Z M 7 8 L 25 8 L 25 19 L 7 19 Z M 6.4375 21 L 25.5625 21 L 27.875 23.28125 C 27.953125 23.359375 28 23.484375 28 23.59375 C 28 23.835938 27.835938 24 27.59375 24 L 4.40625 24 C 4.164063 24 4 23.835938 4 23.59375 C 4 23.484375 4.046875 23.359375 4.125 23.28125 Z">
                                </path>
                            </svg>
                        </span>

                        <span class="svg screen-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-rectangle-horizontal-icon lucide-rectangle-horizontal">
                                <rect width="20" height="12" x="2" y="6" rx="2" />
                            </svg>
                        </span>
                    </span>
                </span>

                <span class="fn-key align-end">F8</span>
            </button>

            <button class="content-end">
                <span class="fn-key align-end">F9</span>
            </button>

            <button>
                <span class="key">prt sc</span>

                <span class="fn-key align-end">F10</span>
            </button>

            <button>
                <span class="key">home</span>
                <span class="fn-key align-end">F11</span>
            </button>

            <button>
                <span class="key">end</span>
                <span class="fn-key align-end">F12</span>
            </button>

            <button>
                <span class="key">insert</span>

                <span class="fn-key align-end">
                    <span class="lock-icon svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M420 192h-68v-80a96 96 0 1 0-192 0v80H92a12 12 0 0 0-12 12v280a12 12 0 0 0 12 12h328a12 12 0 0 0 12-12V204a12 12 0 0 0-12-12zm-106 0H198v-80.75a58 58 0 1 1 116 0z">
                            </path>
                        </svg>

                        <span class="lock-text">9</span>
                    </span>
                </span>
            </button>

            <button class="bump-key">
                <span class="key">delete</span>

                <span class="bump"></span>
            </button>
        </div>

        <div class="row row-2">
            <button class="altgr-key content-between medium-size-key">
                <span class="shift-key">¬</span>
                <span class="key">`</span>
                <span class="altgr">|</span>
            </button>

            <button class="content-between">
                <span class="shift-key">!</span>
                <span class="key">1</span>
            </button>

            <button class="content-between">
                <span class="shift-key">"</span>
                <span class="key">2</span>
            </button>

            <button class="content-between">
                <span class="shift-key">£</span>
                <span class="key">3</span>
            </button>

            <button class="altgr-key content-between">
                <span class="shift-key">$</span>
                <span class="key">4</span>
                <span class="altgr">€</span>
            </button>

            <button class="content-between">
                <span class="shift-key">%</span>
                <span class="key">5</span>
            </button>

            <button class="content-between">
                <span class="shift-key">^</span>
                <span class="key">6</span>
            </button>

            <button class="content-between">
                <span class="shift-key">&</span>
                <span class="key">7</span>
            </button>

            <button class="content-between">
                <span class="shift-key">*</span>
                <span class="key">8</span>
            </button>

            <button class="content-between">
                <span class="shift-key">(</span>
                <span class="key">9</span>
            </button>

            <button class="content-between function-key">
                <span class="shift-key">)</span>
                <span class="key">0</span>
                <span class="fn-key">/</span>
            </button>

            <button class="content-between">
                <span class="shift-key">—</span>
                <span class="key">-</span>
            </button>

            <button class="content-between">
                <span class="shift-key">+</span>
                <span class="key">=</span>
            </button>

            <button class="backspace-key">
                <span class="key svg align-end">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                        </path>
                    </svg>
                </span>
            </button>

        </div>

        <div class="enter-key-row-outer">
            <div class="enter-key-row-inner">
                <div class="row row-3">
                    <button class="tab-key">
                        <span class="key">
                            <span class="svg">
                                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                    stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3 19V5"></path>
                                    <path d="m13 6-6 6 6 6"></path>
                                    <path d="M7 12h14"></path>
                                </svg>
                            </span>

                            <span class="svg">
                                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                    stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M17 12H3"></path>
                                    <path d="m11 18 6-6-6-6"></path>
                                    <path d="M21 5v14"></path>
                                </svg>
                            </span>
                        </span>
                    </button>

                    <button>
                        <span class="key">Q</span>
                    </button>

                    <button>
                        <span class="key">W</span>
                    </button>

                    <button>
                        <span class="key">E</span>
                    </button>

                    <button>
                        <span class="key">R</span>
                    </button>

                    <button>
                        <span class="key">T</span>
                    </button>

                    <button>
                        <span class="key">Y</span>
                    </button>

                    <button class="function-key">
                        <span class="key">U</span>
                        <span class="fn-key">4</span>
                    </button>

                    <button class="function-key">
                        <span class="key">I</span>
                        <span class="fn-key">5</span>
                    </button>

                    <button class="function-key">
                        <span class="key">O</span>
                        <span class="fn-key">6</span>
                    </button>

                    <button class="function-key">
                        <span class="key">P</span>
                        <span class="fn-key">*</span>
                    </button>

                    <button>
                        <span class="shift-key">{</span>
                        <span class="key">[</span>
                    </button>

                    <button>
                        <span class="shift-key">}</span>
                        <span class="key">]</span>
                    </button>
                </div>

                <div class="row row-4">
                    <button class="capslock-key light-key">
                        <span class="key">caps lock</span>

                        <span class="light"></span>
                    </button>

                    <button>
                        <span class="key">A</span>
                    </button>

                    <button>
                        <span class="key">S</span>
                    </button>

                    <button>
                        <span class="key">D</span>
                    </button>

                    <button class="bump-key">
                        <span class="key">F</span>
                        <span class="bump"></span>
                    </button>

                    <button>
                        <span class="key">G</span>
                    </button>

                    <button>
                        <span class="key">H</span>
                    </button>

                    <button class="bump-key function-key">
                        <span class="key">J</span>
                        <span class="fn-key">1</span>
                        <span class="bump"></span>
                    </button>

                    <button class="function-key">
                        <span class="key">K</span>
                        <span class="fn-key">2</span>
                    </button>

                    <button class="function-key">
                        <span class="key">L</span>
                        <span class="fn-key">3</span>
                    </button>

                    <button class="function-key">
                        <span class="shift-key">:</span>
                        <span class="key">;</span>
                        <span class="fn-key">-</span>
                    </button>

                    <button>
                        <span class="shift-key">@</span>
                        <span class="key">'</span>
                    </button>

                    <button>
                        <span class="shift-key">~</span>
                        <span class="key">#</span>
                    </button>

                </div>
            </div>

            <div class="enter-key-container">
                <!-- Enter key -->
                <button class="enter-key">
                    <span class="key svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path fill="none" stroke-linecap="square" stroke-miterlimit="10" stroke-width="32"
                                d="m112 352-64-64 64-64"></path>
                            <path fill="none" stroke-linecap="square" stroke-miterlimit="10" stroke-width="32"
                                d="M64 288h400V160"></path>
                        </svg>
                    </span>
                </button>

                <div class="enter-key-decor"></div>
            </div>
        </div>

        <div class="row row-5">
            <div class="decor-container">
                <button class="shift-left-key btn-above">
                    <span class="key svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" version="1.1"
                            viewBox="0 0 16 16" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M10.5 14h-5c-0.276 0-0.5-0.224-0.5-0.5v-5.5h-2c-0.202 0-0.385-0.122-0.462-0.309s-0.035-0.402 0.108-0.545l5-5c0.195-0.195 0.512-0.195 0.707 0l5 5c0.143 0.143 0.186 0.358 0.108 0.545s-0.26 0.309-0.462 0.309h-2v5.5c0 0.276-0.224 0.5-0.5 0.5zM6 13h4v-5.5c0-0.276 0.224-0.5 0.5-0.5h1.293l-3.793-3.793-3.793 3.793h1.293c0.276 0 0.5 0.224 0.5 0.5v5.5z">
                            </path>
                        </svg>
                    </span>

                </button>

                <div class="decor"></div>
            </div>

            <div class="decor-container">
                <button class="btn-above">
                    <span class="shift-key">|</span>
                    <span class="key">\</span>
                </button>

                <div class="decor decor-left"></div>
            </div>

            <button>
                <span class="key">Z</span>
            </button>

            <button>
                <span class="key">X</span>
            </button>

            <button>
                <span class="key">C</span>
            </button>

            <button>
                <span class="key">V</span>
            </button>

            <button>
                <span class="key">B</span>
            </button>

            <button>
                <span class="key">N</span>
            </button>

            <button class="function-key">
                <span class="key">M</span>
                <span class="fn-key">0</span>
            </button>

            <button>
                <span class="shift-key">&lt;</span>
                <span class="key">,</span>
            </button>

            <button class="function-key">
                <span class="shift-key">&gt;</span>
                <span class="key">•</span>
                <span class="fn-key">•</span>
            </button>

            <button class="function-key">
                <span class="shift-key">?</span>
                <span class="key">/</span>
                <span class="fn-key">+</span>
            </button>

            <button class="shift-right-key">
                <span class="key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" version="1.1" viewBox="0 0 16 16"
                        height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M10.5 14h-5c-0.276 0-0.5-0.224-0.5-0.5v-5.5h-2c-0.202 0-0.385-0.122-0.462-0.309s-0.035-0.402 0.108-0.545l5-5c0.195-0.195 0.512-0.195 0.707 0l5 5c0.143 0.143 0.186 0.358 0.108 0.545s-0.26 0.309-0.462 0.309h-2v5.5c0 0.276-0.224 0.5-0.5 0.5zM6 13h4v-5.5c0-0.276 0.224-0.5 0.5-0.5h1.293l-3.793-3.793-3.793 3.793h1.293c0.276 0 0.5 0.224 0.5 0.5v5.5z">
                        </path>
                    </svg>
                </span>
            </button>
        </div>

        <div class="row row-6">
            <button class="ctrl-left-key">
                <span class="key">ctrl</span>
            </button>

            <button>
                <span class="fn-key">fn</span>
            </button>

            <button class="windows-key">
                <span class="key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M6.555 1.375 0 2.237v5.45h6.555zM0 13.795l6.555.933V8.313H0zm7.278-5.4.026 6.378L16 16V8.395zM16 0 7.33 1.244v6.414H16z">
                        </path>
                    </svg>
                </span>
            </button>

            <button class="alt-left-key">
                <span class="key">alt</span>
            </button>

            <button class="space-key"></button>

            <button class="alt-right-key">
                <span class="key">alt gr</span>
            </button>

            <button class="ctrl-right-key function-key">
                <span class="key">ctrl</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                        <path d="M7 8h10"></path>
                        <path d="M7 12h10"></path>
                        <path d="M7 16h10"></path>
                    </svg>
                </span>
            </button>

            <div class="arrow-keys">
                <div class="set">
                    <button>
                        <span class="key">page up</span>
                    </button>

                    <button>
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 13V20L4 12L12 4V11H20V13H12Z"></path>
                            </svg>
                        </span>
                    </button>
                </div>

                <div class="set up-dn-keys">
                    <button>
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13 12V20H11V12H4L12 4L20 12H13Z"></path>
                            </svg>
                        </span>
                    </button>

                    <button class="bump-key">
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13 12H20L12 20L4 12H11V4H13V12Z"></path>
                            </svg>
                        </span>

                        <span class="bump"></span>
                    </button>
                </div>

                <div class="set">
                    <button>
                        <span class="key">page down</span>
                    </button>

                    <button>
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 13H4V11H12V4L20 12L12 20V13Z"></path>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
