<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="keyboard">
        <div class="row row-1">
            <button class="bump-key esc-key">
                <span class="key">Esc</span>

                <span class="fn-key lock-icon">
                    <span class="svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M420 192h-68v-80a96 96 0 1 0-192 0v80H92a12 12 0 0 0-12 12v280a12 12 0 0 0 12 12h328a12 12 0 0 0 12-12V204a12 12 0 0 0-12-12zm-106 0H198v-80.75a58 58 0 1 1 116 0z">
                            </path>
                        </svg>
                    </span>
                    <span class="lock-text">fn</span>
                </span>

                <span class="bump"></span>
            </button>

            <button>
                <span class="key">F1</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06m7.137 2.096a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0">
                        </path>
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">F2</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M9 4a.5.5 0 0 0-.812-.39L5.825 5.5H3.5A.5.5 0 0 0 3 6v4a.5.5 0 0 0 .5.5h2.325l2.363 1.89A.5.5 0 0 0 9 12zm3.025 4a4.5 4.5 0 0 1-1.318 3.182L10 10.475A3.5 3.5 0 0 0 11.025 8 3.5 3.5 0 0 0 10 5.525l.707-.707A4.5 4.5 0 0 1 12.025 8">
                        </path>
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">F3</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11.536 14.01A8.47 8.47 0 0 0 14.026 8a8.47 8.47 0 0 0-2.49-6.01l-.708.707A7.48 7.48 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303z">
                        </path>
                        <path
                            d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.48 5.48 0 0 1 11.025 8a5.48 5.48 0 0 1-1.61 3.89z">
                        </path>
                        <path
                            d="M8.707 11.182A4.5 4.5 0 0 0 10.025 8a4.5 4.5 0 0 0-1.318-3.182L8 5.525A3.5 3.5 0 0 1 9.025 8 3.5 3.5 0 0 1 8 10.475zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06">
                        </path>
                    </svg>
                </span>
            </button>

            <button class="light-key">
                <span class="key">F4</span>
                <span class="fn-key mic-icon">
                    <span class="svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M256 336c35.2 0 64-28.8 64-64V112c0-35.2-28.8-64-64-64s-64 28.8-64 64v160c0 35.2 28.8 64 64 64z">
                            </path>
                            <path
                                d="M352 192c-7.7 0-14 6.3-14 14v69c0 45.2-36.8 82-82 82s-82-36.8-82-82v-69c0-7.7-6.3-14-14-14s-14 6.3-14 14v69c0 55.9 41.9 102.2 96 109.1V436h-36c-7.7 0-14 6.3-14 14s6.3 14 14 14h100c7.7 0 14-6.3 14-14s-6.3-14-14-14h-36v-51.9c54.1-6.9 96-53.2 96-109.1v-69c0-7.7-6.3-14-14-14z">
                            </path>
                        </svg>
                    </span>
                    <span class="cross svg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-x-icon lucide-x">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </span>
                </span>
                <span class="light"></span>
            </button>

            <button>
                <span class="key">F5</span>
                <span class="fn-key lock-icon">
                    <span class="svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M420 192h-68v-80a96 96 0 1 0-192 0v80H92a12 12 0 0 0-12 12v280a12 12 0 0 0 12 12h328a12 12 0 0 0 12-12V204a12 12 0 0 0-12-12zm-106 0H198v-80.75a58 58 0 1 1 116 0z">
                            </path>
                        </svg>
                    </span>
                    <span class="lock-text">9</span>
                </span>
            </button>

            <button>
                <span class="key">F6</span>
                <span class="fn-key lock-icon">
                    <span class="svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M420 192h-68v-80a96 96 0 1 0-192 0v80H92a12 12 0 0 0-12 12v280a12 12 0 0 0 12 12h328a12 12 0 0 0 12-12V204a12 12 0 0 0-12-12zm-106 0H198v-80.75a58 58 0 1 1 116 0z">
                            </path>
                        </svg>
                    </span>
                    <span class="lock-text svg">
                        <!-- lock-hole icon required! -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-award-icon lucide-award">
                            <path
                                d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526" />
                            <circle cx="12" cy="8" r="6" />
                        </svg>
                    </span>
                </span>
            </button>

            <button>
                <span class="key">F7</span>
            </button>

            <button>
                <span class="key">F8</span>
                <span class="fn-key extend-screen-icon">
                    <span class="svg laptop-icon">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 32 32"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M 5 6 L 5 19.5625 L 2.71875 21.875 C 2.265625 22.328125 2 22.953125 2 23.59375 C 2 24.914063 3.085938 26 4.40625 26 L 27.59375 26 C 28.914063 26 30 24.914063 30 23.59375 C 30 22.953125 29.734375 22.328125 29.28125 21.875 L 27 19.5625 L 27 6 Z M 7 8 L 25 8 L 25 19 L 7 19 Z M 6.4375 21 L 25.5625 21 L 27.875 23.28125 C 27.953125 23.359375 28 23.484375 28 23.59375 C 28 23.835938 27.835938 24 27.59375 24 L 4.40625 24 C 4.164063 24 4 23.835938 4 23.59375 C 4 23.484375 4.046875 23.359375 4.125 23.28125 Z">
                            </path>
                        </svg>
                    </span>
                    <span class="monitor-icon svg">
                        <!-- Monitor icon required! -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-rectangle-horizontal-icon lucide-rectangle-horizontal">
                            <rect width="20" height="12" x="2" y="6" rx="2" />
                        </svg>
                    </span>
                </span>
            </button>

            <button>
                <span class="key">F9</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15.25 0a8.25 8.25 0 0 0-6.18 13.72L1 22.88l1.12 1 8.05-9.12A8.251 8.251 0 1 0 15.25.01V0zm0 15a6.75 6.75 0 1 1 0-13.5 6.75 6.75 0 0 1 0 13.5z">
                        </path>
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">F10</span>
                <span class="fn-key svg">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164.71 92.84" fill="none" stroke="currentColor"
                        color="currentColor">
                        <path
                            d="M43.76,56.53c-3.32,2.57-6.65,8.46-9.24,13.61-2.32,5.27-9.3,16.79-5.89,20.11,1.74,1.42,4.69,1.47,7.28,1.65,20.35.87,75.36.57,95.72-.33,7.35-.26,10.51-1.61,7.52-9.81-2.05-5.84-6.29-14.64-10.81-20.5-6.11-8.6-15.18-9.34-24.62-9.37-10.68-.18-24.84-.17-36.71.17-7.79.3-18.5.09-23.11,4.37l-.12.1Z"
                            stroke-width="0.82" fill="currentColor" stroke="currentColor" />

                        <path d="M4.5,37.9c6.66,3.61,16.45,8.92,23.2,12.58" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M38.77,15.13l13.88,21.04" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M81.15,4.5c.08,8.11.18,19.54.26,27.54" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M124.86,13.61c-3.89,6.18-9.71,15.42-13.66,21.69" stroke-width="9"
                            stroke-linecap="round" stroke-linejoin="round" />

                        <path d="M160.21,36.16c-6.87,3.66-16.9,8.99-23.86,12.7" stroke-width="9" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">F11</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" d="M0 0h24v24H0V0z"></path>
                        <path
                            d="m6.76 4.84-1.8-1.79-1.41 1.41 1.79 1.79zM1 10.5h3v2H1zM11 .55h2V3.5h-2zm8.04 2.495 1.408 1.407-1.79 1.79-1.407-1.408zm-1.8 15.115 1.79 1.8 1.41-1.41-1.8-1.79zM20 10.5h3v2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm-1 4h2v2.95h-2zm-7.45-.96 1.41 1.41 1.79-1.8-1.41-1.41z">
                        </path>
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">F12</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 19a1 1 0 0 1 .993 .883l.007 .117v1a1 1 0 0 1 -1.993 .117l-.007 -.117v-1a1 1 0 0 1 1 -1z">
                        </path>
                        <path
                            d="M18.313 16.91l.094 .083l.7 .7a1 1 0 0 1 -1.32 1.497l-.094 -.083l-.7 -.7a1 1 0 0 1 1.218 -1.567l.102 .07z">
                        </path>
                        <path
                            d="M7.007 16.993a1 1 0 0 1 .083 1.32l-.083 .094l-.7 .7a1 1 0 0 1 -1.497 -1.32l.083 -.094l.7 -.7a1 1 0 0 1 1.414 0z">
                        </path>
                        <path d="M4 11a1 1 0 0 1 .117 1.993l-.117 .007h-1a1 1 0 0 1 -.117 -1.993l.117 -.007h1z"></path>
                        <path d="M21 11a1 1 0 0 1 .117 1.993l-.117 .007h-1a1 1 0 0 1 -.117 -1.993l.117 -.007h1z"></path>
                        <path
                            d="M6.213 4.81l.094 .083l.7 .7a1 1 0 0 1 -1.32 1.497l-.094 -.083l-.7 -.7a1 1 0 0 1 1.217 -1.567l.102 .07z">
                        </path>
                        <path
                            d="M19.107 4.893a1 1 0 0 1 .083 1.32l-.083 .094l-.7 .7a1 1 0 0 1 -1.497 -1.32l.083 -.094l.7 -.7a1 1 0 0 1 1.414 0z">
                        </path>
                        <path
                            d="M12 2a1 1 0 0 1 .993 .883l.007 .117v1a1 1 0 0 1 -1.993 .117l-.007 -.117v-1a1 1 0 0 1 1 -1z">
                        </path>
                        <path d="M12 7a5 5 0 1 1 -4.995 5.217l-.005 -.217l.005 -.217a5 5 0 0 1 4.995 -4.783z"></path>
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">PrtScr</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"></path>
                        <path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"></path>
                        <circle cx="12" cy="9" r="2"></circle>
                        <path d="M16.2 4.8c2 2 2.26 5.11.8 7.47"></path>
                        <path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"></path>
                        <path d="M9.5 18h5"></path>
                        <path d="m8 22 4-11 4 11"></path>
                    </svg>
                </span>
            </button>

            <button>
                <span class="key">Insert</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
                            d="M160 136c0-30.62 4.51-61.61 16-88C99.57 81.27 48 159.32 48 248c0 119.29 96.71 216 216 216 88.68 0 166.73-51.57 200-128-26.39 11.49-57.38 16-88 16-119.29 0-216-96.71-216-216z">
                        </path>
                    </svg>
                </span>
            </button>

            <button class="delete-key bump-key">
                <span class="key">Delete</span>
                <span class="bump"></span>
            </button>
        </div>

        <div class="row row-2">
            <button>
                <span class="shift-key">~</span>
                <span class="key">`</span>
            </button>

            <button>
                <span class="shift-key">!</span>
                <span class="key">1</span>
            </button>

            <button>
                <span class="shift-key">@</span>
                <span class="key">2</span>
            </button>

            <button>
                <span class="shift-key">#</span>
                <span class="key">3</span>
            </button>

            <button>
                <span class="shift-key">$</span>
                <span class="key">4</span>
            </button>

            <button>
                <span class="shift-key">%</span>
                <span class="key">5</span>
            </button>

            <button>
                <span class="shift-key">^</span>
                <span class="key">6</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">&</span>
                <span class="key">7</span>
                <span class="fn-key">7</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">*</span>
                <span class="key">8</span>
                <span class="fn-key">8</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">(</span>
                <span class="key">9</span>
                <span class="fn-key">9</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">)</span>
                <span class="key">0</span>
                <span class="fn-key">/</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">—</span>
                <span class="key">-</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">+</span>
                <span class="key">=</span>
            </button>

            <button class="backspace-key">
                <span class="key">
                    <span class="text">Backspace</span>
                    <span class="icon svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                            </path>
                        </svg>
                    </span>
                </span>
            </button>
        </div>

        <div class="row row-3">
            <button class="tab-key">
                <span class="key">
                    <span class="text">Tab</span>
                    <span class="icon">
                        <span class="svg">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 19V5"></path>
                                <path d="m13 6-6 6 6 6"></path>
                                <path d="M7 12h14"></path>
                            </svg>
                        </span>

                        <span class="svg">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M17 12H3"></path>
                                <path d="m11 18 6-6-6-6"></path>
                                <path d="M21 5v14"></path>
                            </svg>
                        </span>
                    </span>
                </span>
            </button>

            <button>
                <span class="key">Q</span>
            </button>

            <button>
                <span class="key">W</span>
            </button>

            <button>
                <span class="key">E</span>
            </button>

            <button>
                <span class="key">R</span>
            </button>

            <button>
                <span class="key">T</span>
            </button>

            <button>
                <span class="key">Y</span>
            </button>

            <button class="fn-center">
                <span class="key">U</span>
                <span class="fn-key">4</span>
            </button>

            <button class="fn-center">
                <span class="key">I</span>
                <span class="fn-key">5</span>
            </button>

            <button class="fn-center">
                <span class="key">O</span>
                <span class="fn-key">6</span>
            </button>

            <button class="fn-center">
                <span class="key">P</span>
                <span class="fn-key">⁕</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">{</span>
                <span class="key">[</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">}</span>
                <span class="key">]</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">|</span>
                <span class="key">\</span>
            </button>
        </div>

        <div class="row row-4">
            <button class="capslock-key light-key">
                <span class="key">Caps Lock</span>
                <span class="light"></span>
            </button>

            <button>
                <span class="key">A</span>
            </button>

            <button>
                <span class="key">S</span>
            </button>

            <button>
                <span class="key">D</span>
            </button>

            <button class="bump-key">
                <span class="key">F</span>
                <span class="bump"></span>
            </button>

            <button>
                <span class="key">G</span>
            </button>

            <button>
                <span class="key">H</span>
            </button>

            <button class="bump-key fn-center">
                <span class="key">J</span>
                <span class="fn-key">1</span>
                <span class="bump"></span>
            </button>

            <button class="fn-center">
                <span class="key">K</span>
                <span class="fn-key">2</span>
            </button>

            <button class="fn-center">
                <span class="key">L</span>
                <span class="fn-key">3</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">:</span>
                <span class="key">;</span>
                <span class="fn-key">-</span>
            </button>

            <button>
                <span class="shift-key">"</span>
                <span class="key">'</span>
            </button>

            <button class="enter-key">
                <span class="key">
                    <span class="text">Enter</span>
                    <span class="icon svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path fill="none" stroke-linecap="square" stroke-miterlimit="10" stroke-width="32"
                                d="m112 352-64-64 64-64"></path>
                            <path fill="none" stroke-linecap="square" stroke-miterlimit="10" stroke-width="32"
                                d="M64 288h400V160"></path>

                    </span>
                </span>
            </button>
        </div>

        <div class="row row-5">
            <button class="shift-left-key">
                <span class="key">
                    <span>Shift</span>
                    <span class="icon svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M7.27 2.047a1 1 0 0 1 1.46 0l6.345 6.77c.6.638.146 1.683-.73 1.683H11.5v3a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-3H1.654C.78 10.5.326 9.455.924 8.816zM14.346 9.5 8 2.731 1.654 9.5H4.5a1 1 0 0 1 1 1v3h5v-3a1 1 0 0 1 1-1z">
                            </path>
                        </svg>
                    </span>
                </span>
            </button>

            <button>
                <span class="key">Z</span>
            </button>

            <button>
                <span class="key">X</span>
            </button>

            <button>
                <span class="key">C</span>
            </button>

            <button>
                <span class="key">V</span>
            </button>

            <button>
                <span class="key">B</span>
            </button>

            <button>
                <span class="key">N</span>
            </button>

            <button class="fn-center">
                <span class="key">M</span>
                <span class="fn-key">0</span>
            </button>

            <button>
                <span class="shift-key">&lt;</span>
                <span class="key">,</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">&gt;</span>
                <span class="key">•</span>
                <span class="fn-key">•</span>
            </button>

            <button class="fn-center">
                <span class="shift-key">?</span>
                <span class="key">/</span>
                <span class="fn-key">+</span>
            </button>

            <button class="shift-right-key">
                <span class="key">
                    <span>Shift</span>
                    <span class="icon svg">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16"
                            height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M7.27 2.047a1 1 0 0 1 1.46 0l6.345 6.77c.6.638.146 1.683-.73 1.683H11.5v3a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-3H1.654C.78 10.5.326 9.455.924 8.816zM14.346 9.5 8 2.731 1.654 9.5H4.5a1 1 0 0 1 1 1v3h5v-3a1 1 0 0 1 1-1z">
                            </path>
                        </svg>
                    </span>
                </span>
            </button>
        </div>

        <div class="row row-6">
            <button class="ctrl-left-key">
                <span class="key">Ctrl</span>
            </button>

            <button class="function-source-key">
                <span class="key">Fn</span>
            </button>

            <button class="windows-key content-center">
                <span class="key svg">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="200px"
                        width="200px" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M6.555 1.375 0 2.237v5.45h6.555zM0 13.795l6.555.933V8.313H0zm7.278-5.4.026 6.378L16 16V8.395zM16 0 7.33 1.244v6.414H16z">
                        </path>
                    </svg>
                </span>
            </button>

            <button class="alt-left-key">
                <span class="key">Alt</span>
            </button>

            <button class="space-key"></button>

            <button class="alt-right-key">
                <span class="key">Alt</span>
            </button>

            <button class="ctrl-right-key">
                <span class="key">Ctrl</span>
                <span class="fn-key svg">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                        <path d="M7 8h10"></path>
                        <path d="M7 12h10"></path>
                        <path d="M7 16h10"></path>
                    </svg>
                </span>
            </button>

            <div class="arrow-keys">
                <div class="set">
                    <button class="content-center">
                        <span class="key">Page Up</span>
                    </button>

                    <button class="left-key content-center">
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                </path>
                            </svg>
                        </span>
                        <span class="fn-key">Home</span>
                    </button>
                </div>

                <div class="set">
                    <button class="up-key content-center">
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                </path>
                            </svg>
                        </span>
                    </button>

                    <button class="down-key content-center bump-key">
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                </path>
                            </svg>
                        </span>
                        <span class="bump"></span>
                    </button>
                </div>

                <div class="set">
                    <button class="page-down-key content-center">
                        <span class="key">Page Down</span>
                    </button>

                    <button class="right-key content-center">
                        <span class="fn-key">End</span>
                        <span class="key svg">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                </path>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>
