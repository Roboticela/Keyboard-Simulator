                            <span class="primary-keys">
                                <span class="key">J</span>
                            </span>

                            <span class="secondary-keys">
                                <span class="fn-key">1</span>
                            </span>
                        </span>

                        <span class="bump"></span>
                    </button>

                    <button>
                        <span class="primary-keys">
                            <span class="key">K</span>
                        </span>

                        <span class="secondary-keys">
                            <span class="fn-key">2</span>
                        </span>
                    </button>

                    <button>
                        <span class="primary-keys">
                            <span class="key">L</span>
                        </span>

                        <span class="secondary-keys">
                            <span class="fn-key">3</span>
                        </span>
                    </button>

                    <button>
                        <span class="primary-keys">
                            <span class="shift-key">:</span>
                            <span class="key">;</span>
                        </span>

                        <span class="secondary-keys">
                            <span class="fn-key">-</span>
                        </span>
                    </button>

                    <button>
                        <span class="primary-keys align-symbol">
                            <span class="shift-key">@</span>
                            <span class="key">'</span>
                        </span>
                    </button>

                    <button>
                        <span class="primary-keys">
                            <span class="shift-key">~</span>
                            <span class="key">#</span>
                        </span>
                    </button>
                </div>
            </div>

            <div>
                <button class="enter-key">
                    <span class="primary-keys">
                        <span class="key svg icon-outer">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M70.5 265.4l59.6-59.4c2.6-2.6 6.1-4.1 9.9-4.1 3.7 0 7.3 1.4 9.9 4.1 2.6 2.6 4.1 6.1 4.1 9.9s-1.5 7.3-4.1 9.9l-.1.1-41.1 40.1H370c13.2 0 25.8-5.2 35.3-14.7 9.5-9.4 14.7-21.9 14.7-35.3v-48c0-7.7 6.3-14 14-14s14 6.3 14 14v48c0 20.8-8.1 40.3-22.9 55.1-14.8 14.8-34.3 22.9-55.1 22.9H108.3l39.6 40.2c2.6 2.6 4.1 6.1 4.1 9.9 0 3.7-1.4 7.3-4.1 9.9l-.1.1c-2.7 2.5-6.2 3.9-9.8 3.9-3.9 0-7.3-1.4-9.9-4.1l-57.6-57.4c-4.2-4.2-6.5-9.8-6.5-15.7 0-5.8 2.3-11.3 6.5-15.4z">
                                </path>
                            </svg>
                        </span>
                    </span>
                </button>
            </div>
        </div>

        <div class="row row-5">
            <button class="shift-left-key">
                <span class="primary-keys">
                    <span class="key svg icon-outer">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20"
                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd"
                                d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="shift-key">|</span>
                    <span class="key">\</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">Z</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">X</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">C</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">V</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">B</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">N</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="key">M</span>
                </span>

                <span class="secondary-keys">
                    <span class="fn-key">0</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="shift-key">&lt;</span>
                    <span class="key">,</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="shift-key">&gt;</span>
                    <span class="key">•</span>
                </span>

                <span class="secondary-keys">
                    <span class="fn-key">•</span>
                </span>
            </button>

            <button>
                <span class="primary-keys">
                    <span class="shift-key">?</span>
                    <span class="key">/</span>
                </span>

                <span class="secondary-keys">
                    <span class="fn-key">+</span>
                </span>
            </button>

            <button class="shift-right-key">
                <span class="primary-keys">
                    <span class="key svg icon-outer">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20"
                            aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd"
                                d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </span>
                </span>

                <span class="secondary-keys">
                    <span class="fn-key">pause</span>
                </span>
            </button>
        </div>

        <div class="row row-6">
            <button class="ctrl-left-key">
                <span class="primary-keys">
                    <span class="key">ctrl</span>
                </span>
            </button>

            <button class="fn-source-key">
                <span class="secondary-keys">
                    <span class="fn-key">fn</span>
                </span>
            </button>

            <button class="place-center windows-key">
                <span class="primary-keys">
                    <span class="key svg icon-outer">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M6.555 1.375 0 2.237v5.45h6.555zM0 13.795l6.555.933V8.313H0zm7.278-5.4.026 6.378L16 16V8.395zM16 0 7.33 1.244v6.414H16z">
                            </path>
                        </svg>
                    </span>
                </span>
            </button>

            <button class="alt-left-key">
                <span class="primary-keys">
                    <span class="key">alt</span>
                </span>
            </button>

            <button class="space-key"></button>

            <button class="alt-right-key">
                <span class="primary-keys">
                    <span class="key">alt gr</span>
                </span>
            </button>

            <button class="ctrl-right-key">
                <span class="primary-keys">
                    <span class="key">ctrl</span>
                </span>
            </button>

            <div class="arrow-keys">
                <button>
                    <span class="primary-keys">
                        <span class="key svg icon-outer">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M217.9 256L345 129c9.4-9.4 9.4-24.6 0-33.9-9.4-9.4-24.6-9.3-34 0L167 239c-9.1 9.1-9.3 23.7-.7 33.1L310.9 417c4.7 4.7 10.9 7 17 7s12.3-2.3 17-7c9.4-9.4 9.4-24.6 0-33.9L217.9 256z">
                                </path>
                            </svg>
                        </span>
                    </span>

                    <span class="secondary-keys">
                        <span class="fn-key">home</span>
                    </span>
                </button>

                <div class="up-down-keys">
                    <button>
                        <span class="primary-keys">
                            <span class="key svg icon-outer">
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M256 217.9L383 345c9.4 9.4 24.6 9.4 33.9 0 9.4-9.4 9.3-24.6 0-34L273 167c-9.1-9.1-23.7-9.3-33.1-.7L95 310.9c-4.7 4.7-7 10.9-7 17s2.3 12.3 7 17c9.4 9.4 24.6 9.4 33.9 0l127.1-127z">
                                    </path>
                                </svg>
                            </span>
                        </span>

                        <span class="secondary-keys">
                            <span class="fn-key">pg up</span>
                        </span>
                    </button>

                    <button>
                        <span class="primary-keys">
                            <span class="key svg icon-outer">
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M256 294.1L383 167c9.4-9.4 24.6-9.4 33.9 0s9.3 24.6 0 34L273 345c-9.1 9.1-23.7 9.3-33.1.7L95 201.1c-4.7-4.7-7-10.9-7-17s2.3-12.3 7-17c9.4-9.4 24.6-9.4 33.9 0l127.1 127z">
                                    </path>
                                </svg>
                            </span>
                        </span>

                        <span class="secondary-keys">
                            <span class="fn-key">pg dn</span>
                        </span>
                    </button>
                </div>

                <button class="arrow-right-key">
                    <span class="primary-keys">
                        <span class="key svg icon-outer">
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M294.1 256L167 129c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.3 34 0L345 239c9.1 9.1 9.3 23.7.7 33.1L201.1 417c-4.7 4.7-10.9 7-17 7s-12.3-2.3-17-7c-9.4-9.4-9.4-24.6 0-33.9l127-127.1z">
                                </path>
                            </svg>
                        </span>
                    </span>

                    <span class="secondary-keys">
                        <span class="fn-key">end</span>
                    </span>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
