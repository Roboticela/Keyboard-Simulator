<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="windows-keyboard-layout-1">
        <!-- Top row (function key row) -->
        <div class="keyboard-top">
            <!-- Function keys row -->
            <div class="row function-key-row">
                <button class="key content-center"><span class="key-primary">Esc</span></button>

                <button class="key content-center"><span class="key-primary">F1</span></button>
                <button class="key content-center"><span class="key-primary">F2</span></button>
                <button class="key content-center"><span class="key-primary">F3</span></button>
                <button class="key content-center"><span class="key-primary">F4</span></button>

                <button class="key content-center"><span class="key-primary">F5</span></button>
                <button class="key content-center"><span class="key-primary">F6</span></button>
                <button class="key content-center"><span class="key-primary">F7</span></button>
                <button class="key content-center"><span class="key-primary">F8</span></button>

                <button class="key content-center"><span class="key-primary">F9</span></button>
                <button class="key content-center"><span class="key-primary">F10</span></button>
                <button class="key content-center"><span class="key-primary">F11</span></button>
                <button class="key content-center"><span class="key-primary">F12</span></button>
            </div>

            <!-- Lock keys row -->
            <div class="row lock-key-row">
                <button class="key content-center text-small">
                    <span class="key-primary multi-line">
                        <span class="line">Print</span>
                        <span class="line">Screen</span>
                        <span class="line">SysRq</span>
                    </span>
                </button>

                <button class="key content-center text-small">
                    <span class="key-primary multi-line">
                        <span class="line">Scroll</span>
                        <span class="line">Lock</span>
                    </span>
                </button>

                <button class="key content-center text-small">
                    <span class="key-primary multi-line">
                        <span class="line">Pause</span>
                        <span class="line">Break</span>
                    </span>
                </button>
            </div>

            <!-- Indicators row -->
            <div class="row indicators">
                <span class="indicator indicator-first">
                    <span class="indicator-light"></span>
                    <span class="indicator-icon content-center">
                        <!-- Power Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-power-icon lucide-power">
                            <path d="M12 2v10" />
                            <path d="M18.4 6.6a9 9 0 1 1-12.77.04" />
                        </svg>
                    </span>
                </span>

                <span class="indicator">
                    <span class="indicator-light"></span>
                    <span class="indicator-icon content-center text-small">1</span>
                </span>

                <span class="indicator">
                    <span class="indicator-light"></span>
                    <span class="indicator-icon content-center text-small">A</span>
                </span>

                <span class="indicator indicator-last">
                    <span class="indicator-light"></span>
                    <span class="indicator-icon content-center">
                        <!-- Arrow down to line icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-arrow-down-to-line-icon lucide-arrow-down-to-line">
                            <path d="M12 17V3" />
                            <path d="m6 11 6 6 6-6" />
                            <path d="M19 21H5" />
                        </svg>
                    </span>
                </span>
            </div>
        </div>

        <!-- Remaining keyboard -->
        <div class="keyboard-bottom">
            <!-- keyboard main -->
            <div class="keyboard-main">
                <div class="row">
                    <button class="key">
                        <span class="key-secondary">~</span>
                        <span class="key-primary">`</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">!</span>
                        <span class="key-primary">1</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">@</span>
                        <span class="key-primary">2</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">#</span>
                        <span class="key-primary">3</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">$</span>
                        <span class="key-primary">4</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">%</span>
                        <span class="key-primary">5</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">^</span>
                        <span class="key-primary">6</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">&</span>
                        <span class="key-primary">7</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">*</span>
                        <span class="key-primary">8</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">(</span>
                        <span class="key-primary">9</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">)</span>
                        <span class="key-primary">0</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">—</span>
                        <span class="key-primary">-</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">+</span>
                        <span class="key-primary">=</span>
                    </button>

                    <button class="key key-backspace content-center text-medium">
                        <div class="key-icon">
                            <!-- Backspace icon -->
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                </path>
                            </svg>
                        </div>
                    </button>
                </div>

                <div class="rows-key-group">
                    <div class="rows">
                        <div class="row">
                            <button class="key key-tab content-center text-medium">
                                <span class="key-primary">Tab</span>
                                <span class="key-icon">
                                    <!-- Tab arrow left icon -->
                                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                        stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M3 19V5"></path>
                                        <path d="m13 6-6 6 6 6"></path>
                                        <path d="M7 12h14"></path>
                                    </svg>

                                    <!-- Tab arrow right icon -->
                                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                        stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M17 12H3"></path>
                                        <path d="m11 18 6-6-6-6"></path>
                                        <path d="M21 5v14"></path>
                                    </svg>
                                </span>
                            </button>

                            <button class="key"><span class="key-primary">Q</span></button>
                            <button class="key"><span class="key-primary">W</span></button>
                            <button class="key"><span class="key-primary">E</span></button>
                            <button class="key"><span class="key-primary">R</span></button>
                            <button class="key"><span class="key-primary">T</span></button>
                            <button class="key"><span class="key-primary">Y</span></button>
                            <button class="key"><span class="key-primary">U</span></button>
                            <button class="key"><span class="key-primary">I</span></button>
                            <button class="key"><span class="key-primary">O</span></button>
                            <button class="key"><span class="key-primary">P</span></button>

                            <button class="key align-center">
                                <span class="key-secondary">{</span>
                                <span class="key-primary">[</span>
                            </button>

                            <button class="key align-center">
                                <span class="key-secondary">}</span>
                                <span class="key-primary">]</span>
                            </button>
                        </div>

                        <div class="row">
                            <button class="key key-capslock content-center text-medium"><span
                                    class="key-primary">CapsLock</span></button>
                            <button class="key"><span class="key-primary">A</span></button>
                            <button class="key"><span class="key-primary">S</span></button>
                            <button class="key"><span class="key-primary">D</span></button>

                            <button class="key key-bump">
                                <span class="key-primary">F</span>
                                <span class="bump self-center"></span>
                            </button>

                            <button class="key"><span class="key-primary">G</span></button>
                            <button class="key"><span class="key-primary">H</span></button>

                            <button class="key key-bump">
                                <span class="key-primary">J</span>
                                <span class="bump self-center"></span>
                            </button>

                            <button class="key"><span class="key-primary">K</span></button>
                            <button class="key"><span class="key-primary">L</span></button>


                            <button class="key align-center">
                                <span class="key-secondary">:</span>
                                <span class="key-primary">;</span>
                            </button>

                            <button class="key align-center">
                                <span class="key-secondary">"</span>
                                <span class="key-primary">'</span>
                            </button>

                            <button class="key align-center">
                                <span class="key-secondary">|</span>
                                <span class="key-primary">\</span>
                            </button>
                        </div>
                    </div>

                    <div class="row-key row-key-enter">
                        <button class="key key-enter align-start justify-start text-medium">
                            <span class="key-icon">
                                <!-- Enter icon -->
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512"
                                    height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                    <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
                                        d="m112 352-64-64 64-64"></path>
                                    <path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
                                        d="M64 288h294c58.76 0 106-49.33 106-108v-20"></path>
                                </svg>
                            </span>
                            <span class="key-primary">Enter</span>
                        </button>
                    </div>
                </div>

                <div class="row">
                    <button class="key key-shift shift-left align-center justify-start text-medium">
                        <span class="key-icon">
                            <!-- Shift icon -->
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" version="1.1"
                                viewBox="0 0 16 16" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M10.5 14h-5c-0.276 0-0.5-0.224-0.5-0.5v-5.5h-2c-0.202 0-0.385-0.122-0.462-0.309s-0.035-0.402 0.108-0.545l5-5c0.195-0.195 0.512-0.195 0.707 0l5 5c0.143 0.143 0.186 0.358 0.108 0.545s-0.26 0.309-0.462 0.309h-2v5.5c0 0.276-0.224 0.5-0.5 0.5zM6 13h4v-5.5c0-0.276 0.224-0.5 0.5-0.5h1.293l-3.793-3.793-3.793 3.793h1.293c0.276 0 0.5 0.224 0.5 0.5v5.5z">
                                </path>
                            </svg>
                        </span>
                        <span class="key-primary">Shift</span>
                    </button>

                    <button class="key"><span class="key-primary">Z</span></button>
                    <button class="key"><span class="key-primary">X</span></button>
                    <button class="key"><span class="key-primary">C</span></button>
                    <button class="key"><span class="key-primary">V</span></button>
                    <button class="key"><span class="key-primary">B</span></button>
                    <button class="key"><span class="key-primary">N</span></button>
                    <button class="key"><span class="key-primary">M</span></button>

                    <button class="key">
                        <span class="key-secondary">&lt;</span>
                        <span class="key-primary">,</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">&gt;</span>
                        <span class="key-primary">.</span>
                    </button>

                    <button class="key">
                        <span class="key-secondary">?</span>
                        <span class="key-primary">/</span>
                    </button>

                    <button class="key key-shift shift-right align-center justify-start text-medium">
                        <span class="key-icon">
                            <!-- Shift icon -->
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" version="1.1"
                                viewBox="0 0 16 16" height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M10.5 14h-5c-0.276 0-0.5-0.224-0.5-0.5v-5.5h-2c-0.202 0-0.385-0.122-0.462-0.309s-0.035-0.402 0.108-0.545l5-5c0.195-0.195 0.512-0.195 0.707 0l5 5c0.143 0.143 0.186 0.358 0.108 0.545s-0.26 0.309-0.462 0.309h-2v5.5c0 0.276-0.224 0.5-0.5 0.5zM6 13h4v-5.5c0-0.276 0.224-0.5 0.5-0.5h1.293l-3.793-3.793-3.793 3.793h1.293c0.276 0 0.5 0.224 0.5 0.5v5.5z">
                                </path>
                            </svg>
                        </span>
                        <span class="key-primary">Shift</span>
                    </button>
                </div>

                <div class="row">
                    <button class="key key-ctrl justify-center align-start key-medium text-medium"><span
                            class="key-primary">Ctrl</span></button>

                    <button class="key key-windows content-center key-medium">
                        <span class="key-icon">
                            <!-- Windows icon -->
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M6.555 1.375 0 2.237v5.45h6.555zM0 13.795l6.555.933V8.313H0zm7.278-5.4.026 6.378L16 16V8.395zM16 0 7.33 1.244v6.414H16z">
                                </path>
                            </svg>
                        </span>
                    </button>

                    <button class="key key-alt justify-center align-start key-medium text-medium"><span
                            class="key-primary">Alt</span></button>
                    <button class="key key-space"></button>
                    <button class="key key-alt justify-center align-start key-medium text-medium"><span
                            class="key-primary">Alt</span></button>

                    <button class="key key-windows content-center key-medium">
                        <span class="key-icon">
                            <!-- Windows icon -->
                            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16"
                                height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M6.555 1.375 0 2.237v5.45h6.555zM0 13.795l6.555.933V8.313H0zm7.278-5.4.026 6.378L16 16V8.395zM16 0 7.33 1.244v6.414H16z">
                                </path>
                            </svg>
                        </span>
                    </button>

                    <button class="key key-menu justify-center align-start key-medium">
                        <span class="key-icon">
                            <!-- Menu icon -->
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24"
                                stroke-linecap="round" stroke-linejoin="round" height="200px" width="200px"
                                xmlns="http://www.w3.org/2000/svg">
                                <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                                <path d="M7 8h10"></path>
                                <path d="M7 12h10"></path>
                                <path d="M7 16h10"></path>
                            </svg>
                        </span>
                    </button>

                    <button class="key key-ctrl justify-center align-start key-medium text-medium"><span
                            class="key-primary">Ctrl</span></button>
                </div>
            </div>

            <!-- keyboard navigation -->
            <div class="keyboard-nav">
                <div class="rows nav-keys">
                    <div class="row">
                        <button class="key content-center text-small"><span class="key-primary">Insert</span></button>
                        <button class="key content-center text-small"><span class="key-primary">Home</span></button>
                        <button class="key content-center text-small">
                            <span class="key-primary multi-line">
                                <span class="line">Page</span>
                                <span class="line">Up</span>
                            </span>
                        </button>
                    </div>

                    <div class="row">
                        <button class="key content-center text-small"><span class="key-primary">Delete</span></button>
                        <button class="key content-center text-small"><span class="key-primary">End</span></button>
                        <button class="key content-center text-small">
                            <span class="key-primary multi-line">
                                <span class="line">Page</span>
                                <span class="line">Down</span>
                            </span>
                        </button>
                    </div>
                </div>

                <div class="rows arrow-keys">
                    <div class="row">
                        <button class="key content-center">
                            <span class="key-icon arrow-up-icon">
                                <!-- Arrow icon -->
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                    height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                    </path>
                                </svg>
                            </span>
                        </button>
                    </div>

                    <div class="row">
                        <button class="key content-center">
                            <span class="key-icon arrow-left-icon">
                                <!-- Arrow icon -->
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                    height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                    </path>
                                </svg>
                            </span>
                        </button>

                        <button class="key content-center">
                            <span class="key-icon arrow-down-icon">
                                <!-- Arrow icon -->
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                    height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                    </path>
                                </svg>
                            </span>
                        </button>

                        <button class="key content-center">
                            <span class="key-icon arrow-right-icon">
                                <!-- Arrow icon -->
                                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 448 512"
                                    height="200px" width="200px" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                    </path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- keyboard numpad -->
            <div class="keyboard-numpad">
                <div class="row">
                    <button class="key content-center text-small">
                        <span class="key-primary multi-line">
                            <span class="line">Num</span>
                            <span class="line">Lock</span>
                        </span>
                    </button>

                    <button class="key content-center"><span class="key-primary">/</span></button>
                    <button class="key content-center"><span class="key-primary">*</span></button>
                    <button class="key content-center"><span class="key-primary">-</span></button>
                </div>

                <div class="rows-key-group">
                    <div class="rows">
                        <div class="row">
                            <button class="key justify-between align-center">
                                <span class="key-primary">7</span>
                                <span class="text-small">Home</span>
                            </button>

                            <button class="key justify-between align-center">
                                <span class="key-primary">8</span>
                                <span class="key-icon arrow-up-icon">
                                    <!-- Arrow icon -->
                                    <svg stroke="currentColor" fill="currentColor" stroke-width="0"
                                        viewBox="0 0 448 512" height="200px" width="200px"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                        </path>
                                    </svg>
                                </span>
                            </button>

                            <button class="key justify-between align-center">
                                <span class="key-primary">9</span>
                                <span class="text-small">PgUp</span>
                            </button>
                        </div>

                        <div class="row">
                            <button class="key justify-between align-center">
                                <span class="key-primary">4</span>
                                <span class="key-icon arrow-left-icon">
                                    <!-- Arrow icon -->
                                    <svg stroke="currentColor" fill="currentColor" stroke-width="0"
                                        viewBox="0 0 448 512" height="200px" width="200px"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M134.059 296H436c6.627 0 12-5.373 12-12v-56c0-6.627-5.373-12-12-12H134.059v-46.059c0-21.382-25.851-32.09-40.971-16.971L7.029 239.029c-9.373 9.373-9.373 24.569 0 33.941l86.059 86.059c15.119 15.119 40.971 4.411 40.971-16.971V296z">
                                        </path>
                                    </svg>
                                </span>
                            </button>

                            <button class="key justify-between align-center key-bump">
                                <span class="key-primary">5</span>
                                <span class="bump"></span>
                            </button>

                            <button class="key justify-between align-center">
                                <span class="key-primary">6</span>
                                <span class="key-icon arrow-right-icon">
                                    <!-- Arrow icon -->
                                    <svg stroke="currentColor" fill="currentColor" stroke-width="0"
                                        viewBox="0 0 448 512" height="200px" width="200px"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
